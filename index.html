<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OstuGuru</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f2f2f7; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 5px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .add-btn { background: #007aff; color: white; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🛒 OstuGuru</h3>
        <div class="row">
            <input type="text" id="i" placeholder="Lisa toode..." oninput="showSug()">
            <button class="add-btn" onclick="add()">LISA</button>
        </div>
        <div id="suggestions" style="background: #fff; border: 1px solid #ccc; display: none;"></div>
        <div id="l">Laadin...</div>
    </div>

    <script>
        const U = 'https://dcswfbqbdtotjglhcbxk.supabase.co'; 
        const K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjc3dmYnFiZHRvdGpnbGhjYnhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTg4NzQsImV4cCI6MjA4OTQzNDg3NH0.mnOxD-aGTHvyhPkAiCHd5OPnW5fwGn6pG7mOrEdJOuI';
        const sb = supabase.createClient(U, K);
        let hist = new Set();

        async function r() {
            const { data, error } = await sb.from('shopping_list').select('*').order('created_at', { ascending: false });
            if (error) { document.getElementById('l').innerText = "Viga: " + error.message; return; }
            if (data) {
                data.forEach(x => hist.add(x.text));
                document.getElementById('l').innerHTML = data.map(x => `
                    <div class="item"><span>${x.text}</span><button style="color:red; background:none;" onclick="del('${x.id}')">✕</button></div>
                `).join('');
            }
        }

        function showSug() {
            const val = document.getElementById('i').value.toLowerCase();
            const sugDiv = document.getElementById('suggestions');
            sugDiv.innerHTML = '';
            if (val.length < 1) { sugDiv.style.display = 'none'; return; }
            const fil = Array.from(hist).filter(x => x.toLowerCase().startsWith(val)).slice(0, 5);
            if (fil.length > 0) {
                fil.forEach(s => {
                    const d = document.createElement('div');
                    d.style.padding = '10px'; d.innerText = s;
                    d.onclick = () => { document.getElementById('i').value = s; sugDiv.style.display = 'none'; add(); };
                    sugDiv.appendChild(d);
                });
                sugDiv.style.display = 'block';
            } else { sugDiv.style.display = 'none'; }
        }

        async function add() {
            const i = document.getElementById('i');
            const t = i.value.trim();
            if (!t) return;
            i.value = '';
            await sb.from('shopping_list').insert([{ text: t }]);
            r();
        }

        async function del(id) { await sb.from('shopping_list').delete().eq('id', id); r(); }

        r();
        setInterval(r, 5000);
    </script>
</body>
</html>
