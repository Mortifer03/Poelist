<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OstuGuru</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; background: #f2f2f7; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .row { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; -webkit-appearance: none; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 10px; padding: 10px 15px; font-size: 14px; }
        .add-btn { background: #007aff; color: white; }
        .sync-btn { background: #e5e5ea; color: #000; font-size: 18px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 18px; }
        .del-btn { color: #ff3b30; background: none; font-size: 22px; font-weight: normal; }
        .clear-btn { background: #ff3b30; color: white; width: 100%; margin-top: 20px; }
        #l { min-height: 50px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2 style="margin:0;">🛒 OstuGuru</h2>
            <button class="sync-btn" onclick="load()">🔄</button>
        </div>
        
        <div class="row">
            <input type="text" id="i" placeholder="Lisa toode..." onkeypress="if(event.key==='Enter')add()">
            <button class="add-btn" onclick="add()">LISA</button>
        </div>
        
        <div id="l">Laadin...</div>
        
        <button class="clear-btn" onclick="clr()">🗑️ TÜHJENDA</button>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxATYJCnKK5ffzrgi25YaDNpLQ_a5bFQJLEn6QuzSoev1NaRgOmH9gpnO2gueL1ckPuIg/exec'; 
        let items = [];

        // 1. Lae andmed
        async function load() {
            try {
                const res = await fetch(URL + '?t=' + Date.now());
                items = await res.json();
                render();
            } catch (e) {
                document.getElementById('l').innerText = "Ühenduse viga. Vajuta 🔄";
            }
        }

        // 2. Kuva ekraanil
        function render() {
            const listDiv = document.getElementById('l');
            if (!items || items.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#999;">Nimekiri on tühi</p>';
            } else {
                listDiv.innerHTML = items.map((x, idx) => `
                    <div class="item">
                        <span>📦 ${x}</span>
                        <button class="del-btn" onclick="del(${idx})">✕</button>
                    </div>
                `).join('');
            }
        }

        // 3. Salvesta (kohe ja otse)
        async function save() {
            render(); // Uuenda kohe ekraani
            await fetch(URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(items)
            });
        }

        function add() {
            const input = document.getElementById('i');
            const val = input.value.trim();
            if (!val) return;
            items.unshift(val);
            input.value = '';
            save();
        }

        function del(idx) {
            items.splice(idx, 1);
            save();
        }

        function clr() {
            if (confirm("Tühjenda?")) {
                items = [];
                save();
            }
        }

        // Käivita kohe
        load();
        // Kontrolli teisi seadmeid iga 20 sekundi järel
        setInterval(load, 20000);
    </script>
</body>
</html>
