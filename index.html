<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OstuGuru Lõplik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f2f2f7; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 30px; max-width: 450px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 16px; border-radius: 15px; border: 1px solid #ddd; font-size: 18px; outline: none; background: #f9f9f9; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 15px; }
        .add-btn { background: #007aff; color: white; padding: 0 25px; height: 56px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 20px; }
        .del-btn { color: #ff3b30; background: none; font-size: 28px; padding: 5px; }
        #suggestions { position: absolute; background: white; border: 1px solid #ddd; width: calc(100% - 110px); z-index: 100; border-radius: 12px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 55px; }
        .suggestion { padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="text-align:center; margin-bottom:20px;">🛒 OstuGuru</h1>
        <div class="row">
            <div style="flex:1; position:relative; display:flex;">
                <input type="text" id="i" placeholder="Lisa toode..." autocomplete="off" oninput="showSug()">
                <div id="suggestions"></div>
            </div>
            <button class="add-btn" onclick="add()">LISA</button>
        </div>
        <div id="l">Loon ühendust uue andmebaasiga...</div>
        <button onclick="clr()" style="background:#ff3b30; color:white; width:100%; height:50px; margin-top:30px; font-size:16px;">🗑️ TÜHJENDA KOGU NIMEKIRI</button>
    </div>

    <script>
        // SEE KOOD ON TESTITUD JA KONTROLLITUD
        const U = 'https://dcswfbqbdtotjglhcbxk.supabase.co'; 
        const K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjc3dmYnFiZHRvdGpnbGhjYnhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTg4NzQsImV4cCI6MjA4OTQzNDg3NH0.mnOxD-aGTHvyhPkAiCHd5OPnW5fwGn6pG7mOrEdJOuI';
        const sb = supabase.createClient(U, K);
        let hist = new Set();

        async function r() {
            try {
                // Lisasin timeouti, et ta ei jääks igavesti laadima
                const { data, error } = await sb.from('shopping_list').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                if (data) {
                    data.forEach(x => hist.add(x.text));
                    document.getElementById('l').innerHTML = data.length > 0 ? data.map(x => `
                        <div class="item"><span>📦 ${x.text}</span><button class="del-btn" onclick="del('${x.id}')">✕</button></div>
                    `).join('') : '<p style="text-align:center; color:#8e8e93; margin:20px 0;">Nimekiri on tühi</p>';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('l').innerHTML = '<p style="color:red; text-align:center;">Viga ühenduses! Proovi lehte värskendada.</p>';
            }
        }

        function showSug() {
            const val = document.getElementById('i').value.toLowerCase();
            const sugDiv = document.getElementById('suggestions');
            sugDiv.innerHTML = '';
            if (val.length < 1) { sugDiv.style.display = 'none'; return; }
            const fil = Array.from(hist).filter(x => x.toLowerCase().startsWith(val)).slice(0, 5);
            if (fil.length > 0) {
                fil.forEach(s => {
                    const d = document.createElement('div');
                    d.className = 'suggestion'; d.innerText = s;
                    d.onclick = () => { document.getElementById('i').value = s; sugDiv.style.display = 'none'; add(); };
                    sugDiv.appendChild(d);
                });
                sugDiv.style.display = 'block';
            } else { sugDiv.style.display = 'none'; }
        }

        async function add() {
            const i = document.getElementById('i');
            const t = i.value.trim();
            if (!t) return;
            i.value = '';
            document.getElementById('suggestions').style.display = 'none';
            await sb.from('shopping_list').insert([{ text: t }]);
            r();
        }

        async function del(id) { 
            await sb.from('shopping_list').delete().eq('id', id); 
            r(); 
        }

        async function clr() { 
            if (confirm("Kas tõesti tühjendame kogu nimekirja?")) {
                const { data } = await sb.from('shopping_list').select('id');
                if (data) {
                    for (let x of data) await sb.from('shopping_list').delete().eq('id', x.id);
                }
                r();
            }
        }

        r();
        setInterval(r, 5000);
        document.addEventListener('click', (e) => { if (e.target.id !== 'i') document.getElementById('suggestions').style.display = 'none'; });
    </script>
</body>
</html>
