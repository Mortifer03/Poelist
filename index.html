<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OstuGuru</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 450px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 8px; margin-bottom: 20px; position: relative; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #ccc; font-size: 18px; outline: none; -webkit-appearance: none; }
        #sug { position: absolute; background: white; border: 1px solid #ddd; width: calc(100% - 85px); z-index: 99; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: none; margin-top: 55px; }
        .s { padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 12px; }
        .add { background: #007aff; color: white; padding: 0 20px; height: 55px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 20px; }
        .del { color: #ff3b30; background: none; font-size: 28px; }
        .clr { background: #ff3b30; color: white; width: 100%; margin-top: 25px; height: 45px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center;">🛒 OstuGuru</h2>
        <div class="row">
            <input type="text" id="i" placeholder="Lisa toode..." oninput="naita()">
            <div id="sug"></div>
            <button class="add" onclick="lisa()">LISA</button>
        </div>
        <div id="list">Laadin...</div>
        <button class="clr" onclick="tyhja()">TÜHJENDA NIMEKIRI</button>
    </div>

    <script>
        var URL = 'https://script.google.com/macros/s/AKfycbxATYJCnKK5ffzrgi25YaDNpLQ_a5bFQJLEn6QuzSoev1NaRgOmH9gpnO2gueL1ckPuIg/exec';
        var asjad = [];
        var ajalugu = JSON.parse(localStorage.getItem('og_ajalugu') || '[]');

        async function lae() {
            try {
                var r = await fetch(URL + "?t=" + new Date().getTime());
                var d = await r.json();
                if (JSON.stringify(d) !== JSON.stringify(asjad)) {
                    asjad = d;
                    kuva();
                }
            } catch (e) { console.log("viga"); }
        }

        function kuva() {
            var h = "";
            if (asjad.length === 0) { h = "<p style='text-align:center; color:#999;'>Tühi</p>"; }
            else {
                for (var i = 0; i < asjad.length; i++) {
                    h += '<div class="item"><span>📦 ' + asjad[i] + '</span>' +
                         '<button class="del" onclick="kustuta(' + i + ')">✕</button></div>';
                }
            }
            document.getElementById('list').innerHTML = h;
        }

        async function sada() {
            kuva();
            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(asjad) });
        }

        function lisa() {
            var sis = document.getElementById('i');
            var v = sis.value.trim();
            if (!v) return;
            asjad.unshift(v);
            if (ajalugu.indexOf(v) === -1) {
                ajalugu.push(v);
                localStorage.setItem('og_ajalugu', JSON.stringify(ajalugu));
            }
            sis.value = "";
            document.getElementById('sug').style.display = "none";
            sada();
        }

        function kustuta(n) {
            asjad.splice(n, 1);
            sada();
        }

        function tyhja() {
            if (confirm("Kas kõik?")) { asjad = []; sada(); }
        }

        function naita() {
            var v = document.getElementById('i').value.toLowerCase();
            var sDiv = document.getElementById('sug');
            sDiv.innerHTML = "";
            if (v.length < 1) { sDiv.style.display = "none"; return; }
            var f = ajalugu.filter(x => x.toLowerCase().startsWith(v)).slice(0, 5);
            if (f.length > 0) {
                f.forEach(t => {
                    var d = document.createElement('div');
                    d.className = 's'; d.innerText = t;
                    d.onclick = function() { document.getElementById('i').value = t; lisa(); };
                    sDiv.appendChild(d);
                });
                sDiv.style.display = "block";
            } else { sDiv.style.display = "none"; }
        }

        lae();
        setInterval(lae, 5000);
    </script>
</body>
</html>
