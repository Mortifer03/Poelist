<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OstuGuru Lõplik</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f2f2f7; margin: 0; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 25px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 16px; border-radius: 15px; border: 1px solid #ddd; font-size: 18px; outline: none; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 15px; height: 56px; background: #007aff; color: white; padding: 0 20px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛒 OstuGuru</h1>
        <div class="row">
            <input type="text" id="i" placeholder="Lisa toode...">
            <button onclick="add()">LISA</button>
        </div>
        <div id="l">Laadin...</div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxATYJCnKK5ffzrgi25YaDNpLQ_a5bFQJLEn6QuzSoev1NaRgOmH9gpnO2gueL1ckPuIg/exec'; 
        let items = [];

        async function r() {
            try {
                const res = await fetch(URL);
                items = await res.json();
                document.getElementById('l').innerHTML = items.map((x, idx) => `
                    <div class="item"><span>📦 ${x}</span><button style="background:none; color:red; font-size:25px;" onclick="del(${idx})">✕</button></div>
                `).join('') || 'Nimekiri on tühi';
            } catch (e) { document.getElementById('l').innerText = "Viga ühenduses!"; }
        }

        async function save() {
            await fetch(URL, { method: 'POST', body: JSON.stringify(items) });
            r();
        }

        function add() {
            const i = document.getElementById('i');
            if (!i.value.trim()) return;
            items.unshift(i.value.trim());
            i.value = '';
            save();
        }

        function del(idx) {
            items.splice(idx, 1);
            save();
        }

        r();
        setInterval(r, 5000);
    </script>
</body>
</html>
